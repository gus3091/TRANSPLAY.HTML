<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Presentación Transplayy</title>
    <style>
        /* Forzamos que la imagen siempre se vea completa sin recortarse */
        .slider-img {
            width: 100%;
            height: 70vh; /* Ajusta la altura según prefieras */
            object-fit: contain; /* Esto es la clave: muestra toda la imagen */
            background-color: #000;
        }
    </style>
</head>
<body class="bg-gray-950 text-white min-h-screen flex flex-col items-center justify-center p-2">

    <h1 class="text-2xl md:text-4xl font-bold mb-4 text-orange-500">Nuestra Presentación</h1>
    
    <!-- Contenedor del Slider -->
    <div class="relative w-full max-w-5xl overflow-hidden rounded-xl shadow-2xl border-2 border-gray-800">
        <div id="slider" class="flex transition-transform duration-500 ease-out">
            <!-- Las imágenes se cargarán solas -->
        </div>

        <!-- Botones -->
        <button onclick="move(-1)" class="absolute left-2 top-1/2 bg-black/70 hover:bg-orange-500 text-white p-4 rounded-full transition z-10">❮</button>
        <button onclick="move(1)" class="absolute right-2 top-1/2 bg-black/70 hover:bg-orange-500 text-white p-4 rounded-full transition z-10">❯</button>
    </div>

    <p id="counter" class="mt-4 text-gray-400 font-mono"></p>

    <div class="mt-6">
        <a href="index.html" class="bg-orange-500 px-6 py-2 rounded-full font-bold hover:bg-orange-600 transition">Volver al Inicio</a>
    </div>

    <script>
        const totalFotos = 23;
        const slider = document.getElementById('slider');
        const counter = document.getElementById('counter');
        let index = 0;

        for (let i = 1; i <= totalFotos; i++) {
            // Se añadió la clase 'slider-img' definida en el <style>
            slider.innerHTML += `<img src="img2/foto${i}.png" class="slider-img flex-shrink-0" alt="Foto ${i}">`;
        }

        function move(step) {
            index = (index + step + totalFotos) % totalFotos;
            slider.style.transform = `translateX(-${index * 100}%)`;
            counter.innerText = `${index + 1} / ${totalFotos}`;
        }

        counter.innerText = `1 / ${totalFotos}`;
    </script>
</body>
</html>
